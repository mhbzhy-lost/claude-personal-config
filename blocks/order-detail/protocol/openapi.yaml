openapi: 3.1.0
info:
  title: Order Detail Block API
  version: 0.1.0
  summary: REST contract for the order-detail block.
  description: |
    E-commerce order detail (single-entity + nested sub-resources +
    status state machine). Pairs naturally with commerce-product-list
    but stands alone.

servers:
  - url: /v1

security:
  - bearerAuth: []

tags:
  - name: Orders
  - name: Me

paths:
  /orders:
    get:
      tags: [Orders]
      operationId: listOrders
      summary: List my orders
      description: Returns the current user's orders, paginated, newest first.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, paid, shipped, delivered, cancelled, refunded]
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderPage' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /orders/{id}:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    get:
      tags: [Orders]
      operationId: getOrder
      summary: Get order detail (with items + status events)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /orders/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: cancelOrder
      summary: Cancel a pending order
      description: |
        Cancels an order in `pending` status. Returns 422 if the order is
        past payment.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason: { type: string, maxLength: 500 }
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /orders/{id}/refund:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: requestRefund
      summary: Request refund for a paid/shipped/delivered order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              additionalProperties: false
              properties:
                reason: { type: string, minLength: 5, maxLength: 500 }
      responses:
        '200':
          description: Refund requested
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /me:
    get:
      tags: [Me]
      operationId: getMe
      summary: Get the current authenticated user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrderId:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Unprocessable:
      description: Validation failed
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    Ulid:
      type: string
      pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'

    User:
      type: object
      required: [id, name]
      additionalProperties: false
      properties:
        id:         { $ref: '#/components/schemas/Ulid' }
        name:       { type: string, maxLength: 200 }
        avatar_url: { type: string, format: uri, nullable: true }

    OrderStatus:
      type: string
      enum: [pending, paid, shipped, delivered, cancelled, refunded]

    ShippingAddress:
      type: object
      required: [recipient, phone, country, province, city, street]
      additionalProperties: false
      properties:
        recipient: { type: string, maxLength: 100 }
        phone:     { type: string, maxLength: 30 }
        country:   { type: string, maxLength: 100 }
        province:  { type: string, maxLength: 100 }
        city:      { type: string, maxLength: 100 }
        street:    { type: string, maxLength: 500 }
        postal_code: { type: string, maxLength: 30, nullable: true }

    OrderItem:
      type: object
      required:
        - line_no
        - product_id
        - product_name
        - quantity
        - unit_price
        - line_total
      additionalProperties: false
      properties:
        line_no:        { type: integer, minimum: 1 }
        product_id:     { $ref: '#/components/schemas/Ulid' }
        product_name:   { type: string, maxLength: 200 }
        product_image:  { type: string, format: uri, nullable: true }
        sku:            { type: string, maxLength: 100, nullable: true }
        quantity:       { type: integer, minimum: 1 }
        unit_price:     { type: integer, minimum: 0, description: 'In cents' }
        line_total:     { type: integer, minimum: 0, description: 'In cents' }

    OrderStatusEvent:
      type: object
      required: [status, occurred_at]
      additionalProperties: false
      properties:
        status:      { $ref: '#/components/schemas/OrderStatus' }
        occurred_at: { type: string, format: date-time }
        note:        { type: string, maxLength: 500, nullable: true }

    OrderSummary:
      type: object
      required:
        - id
        - order_number
        - status
        - currency
        - total
        - item_count
        - created_at
      additionalProperties: false
      properties:
        id:           { $ref: '#/components/schemas/Ulid' }
        order_number: { type: string, maxLength: 50 }
        status:       { $ref: '#/components/schemas/OrderStatus' }
        currency:     { type: string, minLength: 3, maxLength: 3 }
        total:        { type: integer, minimum: 0 }
        item_count:   { type: integer, minimum: 1 }
        cover_image:  { type: string, format: uri, nullable: true }
        created_at:   { type: string, format: date-time }

    OrderDetail:
      type: object
      required:
        - id
        - order_number
        - status
        - currency
        - subtotal
        - shipping
        - total
        - shipping_address
        - items
        - status_events
        - created_at
        - updated_at
      additionalProperties: false
      properties:
        id:           { $ref: '#/components/schemas/Ulid' }
        order_number: { type: string, maxLength: 50 }
        status:       { $ref: '#/components/schemas/OrderStatus' }
        currency:     { type: string, minLength: 3, maxLength: 3 }
        subtotal:     { type: integer, minimum: 0 }
        shipping:     { type: integer, minimum: 0 }
        total:        { type: integer, minimum: 0 }
        shipping_address: { $ref: '#/components/schemas/ShippingAddress' }
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/OrderItem' }
        status_events:
          type: array
          items: { $ref: '#/components/schemas/OrderStatusEvent' }
        paid_at:      { type: string, format: date-time, nullable: true }
        shipped_at:   { type: string, format: date-time, nullable: true }
        delivered_at: { type: string, format: date-time, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        cancel_reason: { type: string, maxLength: 500, nullable: true }
        refund_reason: { type: string, maxLength: 500, nullable: true }
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time }

    OrderPage:
      type: object
      required: [items, total, page, page_size, has_more]
      additionalProperties: false
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderSummary' }
        total:     { type: integer, minimum: 0 }
        page:      { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }
        has_more:  { type: boolean }

    Problem:
      type: object
      required: [type, title, status]
      additionalProperties: true
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }
        code:     { type: string }
        errors:
          type: object
          additionalProperties: { type: array, items: { type: string } }
