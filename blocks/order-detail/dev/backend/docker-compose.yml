services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: od
      POSTGRES_PASSWORD: od
      POSTGRES_DB: od
    ports:
      - "5546:5432"
    volumes:
      - od-pg:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U od -d od"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  od-pg:
