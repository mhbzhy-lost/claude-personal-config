services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: up
      POSTGRES_PASSWORD: up
      POSTGRES_DB: up
    ports:
      - "5551:5432"
    volumes:
      - up-pg:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U up -d up"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  up-pg:
