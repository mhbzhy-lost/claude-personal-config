services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: imcl
      POSTGRES_PASSWORD: imcl
      POSTGRES_DB: imcl
    ports:
      - "5544:5432"
    volumes:
      - imcl-pg:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imcl -d imcl"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  imcl-pg:
