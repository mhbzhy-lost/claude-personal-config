asyncapi: 3.0.0
info:
  title: IM Conversation List Block — WebSocket events
  version: 0.1.0
  description: |
    Real-time event channel for the conversation list block. Single multiplexed
    WebSocket carrying server-pushed updates and client-acked receipts.

    Authentication is performed at the WS handshake (Bearer JWT in
    `Sec-WebSocket-Protocol` or `Authorization` header — backend chooses).
    All events are scoped to the authenticated user.

defaultContentType: application/json

servers:
  default:
    host: '{host}'
    pathname: /v1/ws
    protocol: wss
    variables:
      host:
        default: api.example.com

channels:
  events:
    address: /v1/ws
    description: Bidirectional event stream for the current user.
    messages:
      ConversationCreated: { $ref: '#/components/messages/ConversationCreated' }
      ConversationUpdated: { $ref: '#/components/messages/ConversationUpdated' }
      ConversationDeleted: { $ref: '#/components/messages/ConversationDeleted' }
      MessageNew:          { $ref: '#/components/messages/MessageNew' }
      MessageUpdated:      { $ref: '#/components/messages/MessageUpdated' }
      MessageRead:         { $ref: '#/components/messages/MessageRead' }
      PresenceChanged:     { $ref: '#/components/messages/PresenceChanged' }
      ReadAck:             { $ref: '#/components/messages/ReadAck' }

operations:
  receiveServerEvents:
    action: receive
    channel:
      $ref: '#/channels/events'
    summary: Server-pushed events.
    messages:
      - $ref: '#/channels/events/messages/ConversationCreated'
      - $ref: '#/channels/events/messages/ConversationUpdated'
      - $ref: '#/channels/events/messages/ConversationDeleted'
      - $ref: '#/channels/events/messages/MessageNew'
      - $ref: '#/channels/events/messages/MessageUpdated'
      - $ref: '#/channels/events/messages/MessageRead'
      - $ref: '#/channels/events/messages/PresenceChanged'

  sendClientEvents:
    action: send
    channel:
      $ref: '#/channels/events'
    summary: Client-sent events.
    messages:
      - $ref: '#/channels/events/messages/ReadAck'

components:
  schemas:
    Envelope:
      type: object
      required: [type, event_version, ts]
      properties:
        type:
          type: string
          description: Event discriminator (e.g. message.new).
        event_version:
          type: integer
          minimum: 1
          default: 1
          description: Per-event schema version, used for forward compat.
        ts:
          type: string
          format: date-time
          description: Server timestamp at emission.
        seq:
          type: integer
          description: |
            Monotonic sequence per user session. Clients use this to detect
            gaps and trigger reconciliation (re-fetch list/messages).

  messages:
    ConversationCreated:
      name: ConversationCreated
      title: A new conversation was created involving the current user
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [type, conversation]
            properties:
              type: { const: 'conversation.created' }
              conversation:
                $ref: 'openapi.yaml#/components/schemas/Conversation'

    ConversationUpdated:
      name: ConversationUpdated
      title: Conversation fields changed (multi-device sync, group meta, etc.)
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [type, conversation]
            properties:
              type: { const: 'conversation.updated' }
              conversation:
                $ref: 'openapi.yaml#/components/schemas/Conversation'
              changed_fields:
                type: array
                items: { type: string }
                description: |
                  Names of fields that changed. Hint for clients to skip
                  unrelated re-renders.

    ConversationDeleted:
      name: ConversationDeleted
      title: Conversation removed from the current user's list
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [type, conversation_id]
            properties:
              type: { const: 'conversation.deleted' }
              conversation_id:
                $ref: 'openapi.yaml#/components/schemas/Ulid'

    MessageNew:
      name: MessageNew
      title: A new message arrived
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [type, message, conversation_summary]
            properties:
              type: { const: 'message.new' }
              message:
                $ref: 'openapi.yaml#/components/schemas/Message'
              conversation_summary:
                description: |
                  Inline summary of the parent conversation's new state
                  (unread_count, last_activity_at, last_message). Lets clients
                  update the list without re-fetching.
                type: object
                required: [id, unread_count, last_activity_at]
                properties:
                  id:               { $ref: 'openapi.yaml#/components/schemas/Ulid' }
                  unread_count:     { type: integer, minimum: 0 }
                  last_activity_at: { type: string, format: date-time }

    MessageUpdated:
      name: MessageUpdated
      title: Message edited or recalled
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [type, message]
            properties:
              type: { const: 'message.updated' }
              message:
                $ref: 'openapi.yaml#/components/schemas/Message'

    MessageRead:
      name: MessageRead
      title: Read receipt
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [type, conversation_id, reader_id, up_to_message_id]
            properties:
              type:              { const: 'message.read' }
              conversation_id:   { $ref: 'openapi.yaml#/components/schemas/Ulid' }
              reader_id:         { $ref: 'openapi.yaml#/components/schemas/Ulid' }
              up_to_message_id:  { $ref: 'openapi.yaml#/components/schemas/Ulid' }

    PresenceChanged:
      name: PresenceChanged
      title: A peer's online status changed
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [type, user_id, online_status]
            properties:
              type:          { const: 'presence.changed' }
              user_id:       { $ref: 'openapi.yaml#/components/schemas/Ulid' }
              online_status: { type: string, enum: [online, offline, away] }

    ReadAck:
      name: ReadAck
      title: Client acknowledges read up to a message
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [type, conversation_id, up_to_message_id]
            properties:
              type:             { const: 'read.ack' }
              conversation_id:  { $ref: 'openapi.yaml#/components/schemas/Ulid' }
              up_to_message_id: { $ref: 'openapi.yaml#/components/schemas/Ulid' }
