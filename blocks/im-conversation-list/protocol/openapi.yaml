openapi: 3.1.0
info:
  title: IM Conversation List Block API
  version: 0.1.0
  summary: REST contract for the WeChat-style conversation list block.
  description: |
    Source of truth for backend implementation and frontend client.
    See `types.md` for human-readable model reference and `asyncapi.yaml`
    for the matching WebSocket event schema.

servers:
  - url: /v1
    description: Default mount point. Path prefix carries major version.

security:
  - bearerAuth: []

tags:
  - name: Conversations
  - name: Messages
  - name: Me

paths:
  /conversations:
    get:
      tags: [Conversations]
      operationId: listConversations
      summary: List conversations for the current user
      description: |
        Returns the current user's conversation list. Server-side sort:
        pinned first (by pinned_at desc), then unpinned (by last_activity_at desc).
        Clients must not re-sort.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: filter
          schema:
            type: string
            enum: [all, unread, pinned, muted, archived]
            default: all
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationPage'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /conversations/search:
    get:
      tags: [Conversations]
      operationId: searchConversations
      summary: Search conversations
      description: |
        Full-text search across conversation title and last message preview.
        Implementation may use database FTS or external index — opaque to client.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 200
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationPage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /conversations/{id}:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      tags: [Conversations]
      operationId: getConversation
      summary: Get one conversation
      description: Fetch a single conversation by id, with the current user's per-user state joined.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Conversations]
      operationId: patchConversation
      summary: Update per-user flags
      description: |
        Mutates `is_pinned` / `is_muted` only. Other fields are read-only via
        this endpoint. Multi-device clients should observe the matching
        `conversation.updated` event and reconcile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                is_pinned: { type: boolean }
                is_muted:  { type: boolean }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
    delete:
      tags: [Conversations]
      operationId: deleteConversation
      summary: Remove from current user's list (soft delete)
      description: |
        Does not delete underlying conversation or messages — only hides it
        for the current user. Other participants are unaffected.
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /conversations/{id}/read:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    post:
      tags: [Conversations]
      operationId: markRead
      summary: Mark messages read up to a cursor
      description: Mark all messages in this conversation read up to the given message id, inclusive.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [up_to_message_id]
              additionalProperties: false
              properties:
                up_to_message_id:
                  type: string
                  description: ULID of the last read message, inclusive.
      responses:
        '204': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /conversations/{id}/messages:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      tags: [Messages]
      operationId: listMessages
      summary: List messages in a conversation
      description: Cursor pagination. Newest first.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePage'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Messages]
      operationId: sendMessage
      summary: Send a message
      description: Send a new message to this conversation. Honors `Idempotency-Key` for safe retry.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 128 }
          description: Client-supplied deduplication key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              additionalProperties: false
              properties:
                content:
                  $ref: '#/components/schemas/Content'
                client_id:
                  type: string
                  description: Sender-side dedup id, echoed back in events.
      responses:
        '201':
          description: Created (or idempotent replay)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /me:
    get:
      tags: [Me]
      operationId: getMe
      summary: Get the current authenticated user
      description: |
        Lightweight identity endpoint so clients can resolve "self" in WS
        events without a separate auth introspection step.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ConversationId:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
        description: ULID
    Cursor:
      in: query
      name: cursor
      required: false
      schema: { type: string }
    Limit:
      in: query
      name: limit
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Conflict:
      description: Conflict (e.g. idempotency mismatch)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Unprocessable:
      description: Validation failed
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    Ulid:
      type: string
      pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'

    User:
      type: object
      required: [id, name]
      additionalProperties: false
      properties:
        id:            { $ref: '#/components/schemas/Ulid' }
        name:          { type: string, maxLength: 200 }
        avatar_url:    { type: string, format: uri, nullable: true }
        online_status:
          type: string
          enum: [online, offline, away]
          nullable: true

    Conversation:
      type: object
      required:
        - id
        - type
        - participants
        - participant_count
        - unread_count
        - is_pinned
        - is_muted
        - last_activity_at
        - created_at
        - updated_at
      additionalProperties: false
      properties:
        id:                { $ref: '#/components/schemas/Ulid' }
        type:              { type: string, enum: [direct, group] }
        title:             { type: string, nullable: true, maxLength: 200 }
        avatar_url:        { type: string, format: uri, nullable: true }
        participants:
          type: array
          maxItems: 5
          items: { $ref: '#/components/schemas/User' }
        participant_count: { type: integer, minimum: 1 }
        last_message:
          oneOf:
            - $ref: '#/components/schemas/Message'
            - type: 'null'
        unread_count:      { type: integer, minimum: 0 }
        is_pinned:         { type: boolean }
        is_muted:          { type: boolean }
        pinned_at:         { type: string, format: date-time, nullable: true }
        last_activity_at:  { type: string, format: date-time }
        created_at:        { type: string, format: date-time }
        updated_at:        { type: string, format: date-time }

    Message:
      type: object
      required: [id, conversation_id, sender, content, status, sent_at]
      additionalProperties: false
      properties:
        id:              { $ref: '#/components/schemas/Ulid' }
        conversation_id: { $ref: '#/components/schemas/Ulid' }
        sender:          { $ref: '#/components/schemas/User' }
        content:         { $ref: '#/components/schemas/Content' }
        client_id:       { type: string, nullable: true }
        status:
          type: string
          enum: [sending, sent, delivered, read, failed]
        sent_at:    { type: string, format: date-time }
        edited_at:  { type: string, format: date-time, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }

    Content:
      oneOf:
        - $ref: '#/components/schemas/ContentText'
        - $ref: '#/components/schemas/ContentImage'
        - $ref: '#/components/schemas/ContentFile'
        - $ref: '#/components/schemas/ContentSystem'
        - $ref: '#/components/schemas/ContentRecall'
      discriminator:
        propertyName: kind
        mapping:
          text:   '#/components/schemas/ContentText'
          image:  '#/components/schemas/ContentImage'
          file:   '#/components/schemas/ContentFile'
          system: '#/components/schemas/ContentSystem'
          recall: '#/components/schemas/ContentRecall'

    ContentText:
      type: object
      required: [kind, text]
      additionalProperties: false
      properties:
        kind: { type: string, const: text }
        text: { type: string, maxLength: 10000 }

    ContentImage:
      type: object
      required: [kind, url]
      additionalProperties: false
      properties:
        kind:   { type: string, const: image }
        url:    { type: string, format: uri }
        width:  { type: integer, minimum: 1, nullable: true }
        height: { type: integer, minimum: 1, nullable: true }
        alt:    { type: string, maxLength: 500, nullable: true }

    ContentFile:
      type: object
      required: [kind, url, name, size, mime]
      additionalProperties: false
      properties:
        kind: { type: string, const: file }
        url:  { type: string, format: uri }
        name: { type: string, maxLength: 500 }
        size: { type: integer, minimum: 0 }
        mime: { type: string, maxLength: 200 }

    ContentSystem:
      type: object
      required: [kind, code]
      additionalProperties: false
      properties:
        kind:   { type: string, const: system }
        code:   { type: string, maxLength: 100, description: 'e.g. user_joined, user_left' }
        params: { type: object, additionalProperties: true }

    ContentRecall:
      type: object
      required: [kind, recall_of]
      additionalProperties: false
      properties:
        kind:      { type: string, const: recall }
        recall_of: { $ref: '#/components/schemas/Ulid' }

    ConversationPage:
      type: object
      required: [items, has_more]
      additionalProperties: false
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Conversation' }
        next_cursor: { type: string, nullable: true }
        has_more:    { type: boolean }

    MessagePage:
      type: object
      required: [items, has_more]
      additionalProperties: false
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Message' }
        next_cursor: { type: string, nullable: true }
        has_more:    { type: boolean }

    Problem:
      type: object
      required: [type, title, status]
      additionalProperties: true
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }
        code:     { type: string, description: 'Domain error code, e.g. conversation.not_found' }
        errors:
          type: object
          additionalProperties: { type: array, items: { type: string } }
          description: Field-level validation errors (only on 422).
