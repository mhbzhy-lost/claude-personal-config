openapi: 3.1.0
info:
  title: Commerce Product List Block API
  version: 0.1.0
  summary: REST contract for the e-commerce product list block.
  description: |
    Source of truth for backend and frontend. See `types.md` for the
    human-readable model reference.

servers:
  - url: /v1
    description: Default mount point. Major version in path prefix.

security:
  - bearerAuth: []

tags:
  - name: Products
  - name: Me

paths:
  /products:
    get:
      tags: [Products]
      operationId: listProducts
      summary: List products with filters, sort, offset pagination
      description: |
        Browse the catalog. All filters are AND-composed. `user_state` is
        joined when authenticated; null for anonymous browsing.
      parameters:
        - in: query
          name: q
          schema: { type: string, maxLength: 200 }
          description: Full-text query against name + description.
        - in: query
          name: category
          schema: { type: string, maxLength: 100 }
        - in: query
          name: price_min
          schema: { type: integer, minimum: 0 }
          description: Inclusive, in cents.
        - in: query
          name: price_max
          schema: { type: integer, minimum: 0 }
          description: Inclusive, in cents.
        - in: query
          name: in_stock_only
          schema: { type: boolean, default: false }
        - in: query
          name: sort
          schema:
            type: string
            enum: [price_asc, price_desc, sold_desc, created_desc, rating_desc]
            default: created_desc
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductPage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /products/{id}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Products]
      operationId: getProduct
      summary: Get one product (with user_state if authenticated)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductWithState' }
        '404': { $ref: '#/components/responses/NotFound' }

  /products/{id}/favorite:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    put:
      tags: [Products]
      operationId: setFavorite
      summary: Set favorite state (requires auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_favorite]
              additionalProperties: false
              properties:
                is_favorite: { type: boolean }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProductState' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /products/{id}/cart:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    put:
      tags: [Products]
      operationId: setCartCount
      summary: Set cart count (0 = remove)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [count]
              additionalProperties: false
              properties:
                count: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProductState' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: Stock insufficient
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /me:
    get:
      tags: [Me]
      operationId: getMe
      summary: Get the current authenticated user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProductId:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    RateLimited:
      description: Too many requests
      headers:
        Retry-After: { schema: { type: integer } }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    Ulid:
      type: string
      pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'

    User:
      type: object
      required: [id, name]
      additionalProperties: false
      properties:
        id:         { $ref: '#/components/schemas/Ulid' }
        name:       { type: string, maxLength: 200 }
        avatar_url: { type: string, format: uri, nullable: true }

    UserProductState:
      type: object
      required: [product_id, user_id, is_favorite, cart_count, updated_at]
      additionalProperties: false
      properties:
        product_id:    { $ref: '#/components/schemas/Ulid' }
        user_id:       { $ref: '#/components/schemas/Ulid' }
        is_favorite:   { type: boolean }
        cart_count:    { type: integer, minimum: 0 }
        favorited_at:  { type: string, format: date-time, nullable: true }
        updated_at:    { type: string, format: date-time }

    Product:
      type: object
      required:
        - id
        - name
        - price
        - currency
        - cover_image
        - images
        - stock
        - sold_count
        - rating_count
        - category
        - tags
        - created_at
        - updated_at
      additionalProperties: false
      properties:
        id:             { $ref: '#/components/schemas/Ulid' }
        name:           { type: string, maxLength: 200 }
        description:    { type: string, maxLength: 2000, nullable: true }
        price:          { type: integer, minimum: 0, description: 'In cents' }
        currency:       { type: string, minLength: 3, maxLength: 3 }
        original_price: { type: integer, minimum: 0, nullable: true }
        cover_image:    { type: string, format: uri }
        images:
          type: array
          maxItems: 9
          items: { type: string, format: uri }
        stock:        { type: integer, minimum: 0 }
        sold_count:   { type: integer, minimum: 0 }
        rating:       { type: number, minimum: 0, maximum: 5, nullable: true }
        rating_count: { type: integer, minimum: 0 }
        category:     { type: string, maxLength: 100 }
        tags:
          type: array
          maxItems: 10
          items: { type: string, maxLength: 50 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProductWithState:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          properties:
            user_state:
              oneOf:
                - $ref: '#/components/schemas/UserProductState'
                - type: 'null'

    ProductPage:
      type: object
      required: [items, total, page, page_size, has_more]
      additionalProperties: false
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ProductWithState' }
        total:     { type: integer, minimum: 0 }
        page:      { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }
        has_more:  { type: boolean }

    Problem:
      type: object
      required: [type, title, status]
      additionalProperties: true
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }
        code:     { type: string }
        errors:
          type: object
          additionalProperties: { type: array, items: { type: string } }
