services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ct
      POSTGRES_PASSWORD: ct
      POSTGRES_DB: ct
    ports:
      - "5547:5432"
    volumes:
      - ct-pg:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ct -d ct"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  ct-pg:
