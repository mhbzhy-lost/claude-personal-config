services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pd
      POSTGRES_PASSWORD: pd
      POSTGRES_DB: pd
    ports:
      - "5550:5432"
    volumes:
      - pd-pg:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pd -d pd"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  pd-pg:
