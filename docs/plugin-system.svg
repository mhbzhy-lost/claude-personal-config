  <rect x="420" y="340" width="560" height="160" rx="12" fill="#F0FDF4" stroke="none"/>
  <rect x="1010" y="20" width="340" height="480" rx="12" fill="#F5F3FF" stroke="none"/>
  <rect x="431" y="510" width="560" height="48" rx="8" fill="#F8FAFC" stroke="none"/>

