  <text x="1110" y="257" font-size="9.5" fill="#6B7280">子代理调度策略</text>

  <rect x="1100" y="281" width="160" height="48" rx="8" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="1110" y="301" font-size="12" font-weight="bold" fill="#1E293B">skill-resolve-preflight</text>
