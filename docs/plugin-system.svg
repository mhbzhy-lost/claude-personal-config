  <rect x="1100" y="161" width="160" height="48" rx="8" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="1110" y="181" font-size="12" font-weight="bold" fill="#1E293B">git-commit-hint</text>
