  <line x1="390" y1="260" x2="420" y2="260" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1010" y1="260" x2="980" y2="260" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>

